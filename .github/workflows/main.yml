name: Build Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачивает код вашего мода из репозитория
      - uses: actions/checkout@v4

      # 2. Устанавливает нужную версию Java (JDK 17 для Minecraft 1.20.1)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Делает скрипт Gradle исполняемым (нужно для Linux-систем)
      - name: Make Gradle Wrapper executable
        run: chmod +x ./gradlew

      # 4. Запускает сборку мода с помощью Gradle
      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: build

      # 5. Сохраняет готовый .jar файл как артефакт
      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MikersMutant
          path: build/libs/*.jar
